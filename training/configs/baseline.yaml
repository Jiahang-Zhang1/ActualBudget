data:
  path: /app/data/transactions.csv
  label_col: category
  text_cols:
    - transaction_description
  categorical_cols:
    - country
    - currency
  numeric_cols: []

split:
  train_frac: 0.70
  val_frac: 0.15
  random_state: 42
  stratify: true
  min_examples_per_class: 2

features:
  text:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 1
    max_df: 1.0
    lowercase: true
    strip_accents: unicode
  categorical:
    handle_unknown: ignore

model:
  type: logistic_regression
  C: 4.0
  max_iter: 2000
  class_weight: balanced
  solver: lbfgs
  multi_class: auto

eval:
  top_k: 3
  high_conf_threshold: 0.90

quality_gates:
  test_top1_accuracy_min: 0.70
  test_top3_accuracy_min: 0.90
  test_macro_f1_min: 0.60
  test_high_confidence_precision_min: 0.85
  test_mapped_top1_accuracy_min: 0.75
  per_class_recall_min: 0.40
  per_class_support_min: 20

label_mapping:
  Food & Dining: Food
  Transportation: General
  Shopping & Retail: General
  Entertainment & Recreation: General
  Healthcare & Medical: General
  Utilities & Services: Bills
  Financial Services: Savings
  Income: Income
  Government & Legal: General
  Charity & Donations: General

slices:
  food_keywords:
    - starbucks
    - pizza
    - subway
    - mcdonald
    - uber eat
    - taco bell
    - burger king
  income_keywords:
    - salary
    - payroll
    - bonus
    - income
  shopping_keywords:
    - amazon
    - walmart
    - target
    - costco
  transport_keywords:
    - uber
    - lyft
    - shell
    - exxon
    - chevron

mlflow:
  experiment_name: actual-budget-transaction-classifier
  run_name: baseline_tfidf_logreg

registry:
  model_name: actual-budget-transaction-classifier

output:
  dir: outputs
