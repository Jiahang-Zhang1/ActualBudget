project_name: actual-budget-transaction-classifier

data:
  path: /app/data/transactions.csv
  label_col: category
  text_cols:
    - transaction_description
  categorical_cols:
    - country
    - currency
  numeric_cols: []

split:
  train_frac: 0.70
  val_frac: 0.15
  random_state: 42
  stratify: true
  min_examples_per_class: 2

features:
  word_ngram_range: [1, 2]
  word_max_features: 30000
  word_min_df: 2
  use_char_tfidf: true
  char_ngram_range: [3, 5]
  char_max_features: 15000
  char_min_df: 2

model:
  classifier: logreg
  C: 1.0
  max_iter: 1200
  class_weight: balanced
  random_state: 42

eval:
  top_k: 3

mlflow:
  experiment_name: actual-txn-classifier
  run_name: v1_wordchar_tfidf_logreg

output:
  dir: /app/outputs
